<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Billing Platform Demo</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 520px;
            margin: 40px auto;
            padding: 0 16px;
        }

        form {
            display: grid;
            gap: 12px;
        }

        input, button {
            padding: 10px;
            font-size: 16px;
        }

        #result {
            margin-top: 16px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
<h1>Create customer</h1>

<form id="ping">
    <button type="submit">Ping</button>
    <div id="ping_result"></div>
</form>

<form id="customerForm">
    <label for="name"></label><input id="name" name="name" placeholder="Name" required/>
    <label for="email"></label><input id="email" name="email" placeholder="Email" required type="email"/>
    <button type="submit">Create</button>

    <div id="result"></div>
</form>

<script>
    const customer_form = document.getElementById("customerForm");
    const ping_form = document.getElementById("ping");
    const result = document.getElementById("result");

    const customerEndpoint = "http://localhost:8080/api/v1/customers";
    const pingEndpoint = "http://localhost:8080/api/v1/ping";

    async function createCustomer(payload) {
        const response = await fetch(customerEndpoint, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const body = await response.text();

        return {
            url: response.url,
            status: response.status,
            body: body,
            error: !response.ok
        };
    }

    async function ping() {
        const response = await fetch(pingEndpoint);
        const body = await response.text();

        return {
            url: response.url,
            status: response.status,
            body: body,
            error: !response.ok
        };
    }

    customer_form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const payload = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value
      };

      try {
        const response = await createCustomer(payload);
        if (response.error) {
          result.textContent = `Request failed via ${response.url}: ${response.error}`;
          return;
        }
        result.textContent = `URL: ${response.url}\nStatus: ${response.status}\nBody: ${response.body}`;
      } catch (err) {
        result.textContent = `Request failed: ${err}`;
      }
    })

    ping_form.addEventListener("submit", async (e) => {
        e.preventDefault();

        try {
            const response = await ping();
            if (response.error) {
                result.textContent = `Request failed via ${response.url}: ${response.error}`;
                return;
            }
            result.textContent = `URL: ${response.url}\nStatus: ${response.status}\nBody: ${response.body}`;
        } catch (err) {
            result.textContent = `Request failed: ${err}`;
        }
    })

</script>
</body>
</html>
